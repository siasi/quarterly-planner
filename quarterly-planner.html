<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarterly Planning Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
            padding: 20px;
        }

        #app {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .header h1 {
            margin-bottom: 15px;
            font-size: 24px;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .header-controls label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .header-controls input[type="text"],
        .header-controls input[type="number"] {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .header-controls button {
            padding: 8px 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .header-controls button:hover {
            background: #2980b9;
        }

        #clearBtn {
            background: #e74c3c;
        }

        #clearBtn:hover {
            background: #c0392b;
        }

        .initiative-section,
        .team-summary-section {
            padding: 20px;
        }

        .initiative-section h2,
        .team-summary-section h2 {
            margin-bottom: 15px;
            font-size: 20px;
            color: #2c3e50;
        }

        .initiative-row {
            display: grid;
            grid-template-columns: 200px 1fr 1fr 1fr;
            gap: 10px;
            padding: 15px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 10px;
            align-items: start;
        }

        .initiative-name-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .initiative-name-col input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .initiative-name-col button {
            padding: 4px 8px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .initiative-commitment-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-top: 4px;
        }

        .badge-committed {
            background: #27ae60;
            color: white;
        }

        .badge-pending {
            background: #f39c12;
            color: white;
        }

        .state-column {
            min-height: 60px;
            padding: 10px;
            background: white;
            border: 2px dashed #ccc;
            border-radius: 4px;
        }

        .state-column.drag-over {
            background: #e8f5e9;
            border-color: #27ae60;
        }

        .state-column-header {
            font-size: 12px;
            font-weight: bold;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .team-tag {
            display: inline-block;
            padding: 4px 8px;
            margin: 4px;
            background: #3498db;
            color: white;
            border-radius: 4px;
            font-size: 13px;
            cursor: move;
            user-select: none;
        }

        .team-tag.dragging {
            opacity: 0.5;
        }

        .add-btn {
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .add-btn:hover {
            background: #229954;
        }

        .team-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .team-column {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
        }

        .team-column-header {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .team-column-header.over-capacity {
            color: #e74c3c;
        }

        .team-column-header.under-capacity {
            color: #27ae60;
        }

        .initiative-tag {
            display: block;
            padding: 6px 10px;
            margin-bottom: 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .initiative-tag.committed {
            background: #3498db;
            color: white;
        }

        .initiative-tag.uncommitted {
            background: white;
            border: 2px solid #3498db;
            color: #3498db;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header Section -->
        <header class="header">
            <div class="header-content">
                <h1>Quarterly Planning Tracker</h1>
                <div class="header-controls">
                    <label>
                        Quarter: <input type="text" id="quarterInput" placeholder="Q1 2026">
                    </label>
                    <label>
                        Max Initiatives per Team: <input type="number" id="maxInitiativesInput" min="1" value="5">
                    </label>
                    <button id="exportBtn">Export JSON</button>
                    <button id="importBtn">Import JSON</button>
                    <input type="file" id="importFile" accept=".json" style="display: none;">
                    <button id="clearBtn">Clear All Data</button>
                </div>
            </div>
        </header>

        <!-- Initiative List -->
        <section class="initiative-section">
            <h2>Initiatives</h2>
            <div id="initiativeList"></div>
            <button id="addInitiativeBtn" class="add-btn">+ Add Initiative</button>
        </section>

        <!-- Team Summary Panel -->
        <section class="team-summary-section">
            <h2>Team Summary</h2>
            <div id="teamSummary" class="team-summary-grid"></div>
        </section>
    </div>

<script>
// Data Model
let appState = {
    quarter: 'Q1 2026',
    maxInitiativesPerTeam: 5,
    teams: [],
    initiatives: []
};

// Generate unique IDs
let idCounter = 0;
function generateId(prefix) {
    return `${prefix}-${Date.now()}-${idCounter++}-${Math.random().toString(36).slice(2, 11)}`;
}

// Initialize with sample data
function initializeSampleData() {
    appState = {
        quarter: 'Q1 2026',
        maxInitiativesPerTeam: 5,
        teams: [
            { id: generateId('team'), name: 'Backend Team' },
            { id: generateId('team'), name: 'Frontend Team' },
            { id: generateId('team'), name: 'Mobile Team' },
            { id: generateId('team'), name: 'DevOps Team' }
        ],
        initiatives: [
            {
                id: generateId('init'),
                name: 'Customer Dashboard Redesign',
                teamStates: {}
            },
            {
                id: generateId('init'),
                name: 'Payment Integration',
                teamStates: {}
            },
            {
                id: generateId('init'),
                name: 'Mobile App Performance',
                teamStates: {}
            }
        ]
    };

    // Initialize all team states as uncommitted for all initiatives
    appState.initiatives.forEach(initiative => {
        appState.teams.forEach(team => {
            initiative.teamStates[team.id] = 'uncommitted';
        });
    });

    // Set some example states
    appState.initiatives[0].teamStates[appState.teams[0].id] = 'committed';
    appState.initiatives[0].teamStates[appState.teams[1].id] = 'committed';
    appState.initiatives[1].teamStates[appState.teams[0].id] = 'committed';
    appState.initiatives[2].teamStates[appState.teams[2].id] = 'completed';
}

// localStorage management
const STORAGE_KEY = 'quarterly-planning-data';

function saveToLocalStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
}

function loadFromLocalStorage() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
        try {
            const parsed = JSON.parse(stored);
            // Validate structure
            if (parsed &&
                typeof parsed.quarter === 'string' &&
                typeof parsed.maxInitiativesPerTeam === 'number' &&
                Array.isArray(parsed.teams) &&
                Array.isArray(parsed.initiatives)) {
                appState = parsed;
                return true;
            } else {
                console.warn('Invalid data structure in localStorage, using sample data');
                return false;
            }
        } catch (e) {
            console.error('Failed to parse localStorage data:', e);
            return false;
        }
    }
    return false;
}

// Header control handlers
function setupHeaderControls() {
    const quarterInput = document.getElementById('quarterInput');
    const maxInitiativesInput = document.getElementById('maxInitiativesInput');

    quarterInput.value = appState.quarter;
    maxInitiativesInput.value = appState.maxInitiativesPerTeam;

    quarterInput.addEventListener('input', (e) => {
        appState.quarter = e.target.value;
        saveToLocalStorage();
        render();
    });

    maxInitiativesInput.addEventListener('change', (e) => {
        appState.maxInitiativesPerTeam = parseInt(e.target.value, 10);
        saveToLocalStorage();
        render();
    });
}

// Initialize app
function initializeApp() {
    const hasStoredData = loadFromLocalStorage();
    if (!hasStoredData) {
        initializeSampleData();
        saveToLocalStorage();
    }
    render();
}

function render() {
    console.log('Rendering with state:', appState);
    setupHeaderControls();
    renderInitiatives();
    renderTeamSummary();
}

function renderInitiatives() {
    console.log('Rendering initiatives...');
}

function renderTeamSummary() {
    console.log('Rendering team summary...');
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', initializeApp);
</script>
</body>
</html>
