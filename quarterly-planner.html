<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarterly Planning Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
            padding: 20px;
        }

        #app {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .header h1 {
            margin-bottom: 15px;
            font-size: 24px;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .header-controls label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .header-controls input[type="text"],
        .header-controls input[type="number"] {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .header-controls button {
            padding: 8px 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .header-controls button:hover {
            background: #2980b9;
        }

        #clearBtn {
            background: #e74c3c;
        }

        #clearBtn:hover {
            background: #c0392b;
        }

        .initiative-section,
        .quarter-section,
        .next-section,
        .team-summary-section {
            padding: 20px;
        }

        .initiative-section h2,
        .quarter-section h2,
        .next-section h2,
        .team-summary-section h2 {
            margin-bottom: 15px;
            font-size: 20px;
            color: #2c3e50;
        }

        .initiative-row {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .initiative-row.dragging-row {
            opacity: 0.4;
        }

        .initiative-row.drag-over {
            border-top: 3px solid #3498db;
        }

        .initiative-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 15px 10px 15px;
            border-bottom: 1px solid #ddd;
        }

        .initiative-body {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            padding: 15px;
            align-items: start;
        }

        .initiative-grip-col {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            color: #95a5a6;
            font-size: 18px;
            user-select: none;
        }

        .initiative-grip-col:active {
            cursor: grabbing;
        }

        .initiative-grip-col:hover {
            color: #7f8c8d;
        }

        .initiative-name-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            padding: 4px 8px;
            outline: none;
        }

        .initiative-name-input:hover {
            background: rgba(52, 152, 219, 0.05);
            border-radius: 3px;
        }

        .initiative-name-input:focus {
            background: white;
            border: 1px solid #3498db;
            border-radius: 3px;
            padding: 3px 7px;
        }

        .initiative-header-controls {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .initiative-delete-btn {
            width: 30px;
            height: 30px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }

        .initiative-delete-btn:hover {
            background: #7f8c8d;
        }

        .initiative-name-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .initiative-name-col input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .initiative-name-col button {
            padding: 4px 8px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .initiative-commitment-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-top: 4px;
        }

        .initiative-delete-col {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .initiative-delete-col button {
            width: 40px;
            height: 40px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }

        .initiative-delete-col button:hover {
            background: #c0392b;
        }

        .badge-committed {
            background: #27ae60;
            color: white;
        }

        .badge-pending {
            background: #f39c12;
            color: white;
        }

        .badge-blocked {
            background: #e74c3c;
            color: white;
        }

        .state-column {
            min-height: 60px;
            padding: 10px;
            background: white;
            border: 2px dashed #ccc;
            border-radius: 4px;
        }

        .state-column.drag-over {
            background: #e8f5e9;
            border-color: #27ae60;
        }

        .state-column-header {
            font-size: 12px;
            font-weight: bold;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .team-tag {
            display: inline-block;
            padding: 4px 8px;
            margin: 4px;
            color: white;
            /* Background color will be set dynamically based on team capacity */
            border-radius: 4px;
            font-size: 13px;
            cursor: move;
            user-select: none;
        }

        .team-tag.dragging {
            opacity: 0.5;
        }

        .team-tag:focus {
            outline: 3px solid #3498db;
            outline-offset: 2px;
        }

        .team-tag-summary {
            display: inline-block;
            padding: 4px 8px;
            margin: 2px;
            color: white;
            border-radius: 4px;
            font-size: 12px;
            /* Background color will be set dynamically based on team capacity */
        }

        .eta-input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .eta-input:focus {
            outline: none;
            border-color: #3498db;
        }

        .add-btn {
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        .add-btn:hover {
            background: #229954;
        }

        .initiatives-summary-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .initiatives-summary-table th {
            background: #2c3e50;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: bold;
            font-size: 14px;
        }

        .initiatives-summary-table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        .initiatives-summary-table tr:last-child td {
            border-bottom: none;
        }

        .initiatives-summary-table tr:hover {
            background: #f9f9f9;
        }

        .team-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .team-column {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
        }

        .team-column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 12px;
        }

        .team-name {
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
            flex: 1;
        }

        .team-capacity {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .initiative-tag {
            display: block;
            padding: 6px 10px;
            margin-bottom: 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .initiative-tag.committed {
            background: #3498db;
            color: white;
        }

        .initiative-tag.uncommitted {
            background: white;
            border: 2px solid #3498db;
            color: #3498db;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header Section -->
        <header class="header">
            <div class="header-content">
                <h1>Quarterly Planning Tracker</h1>
                <div class="header-controls">
                    <label>
                        Quarter: <input type="text" id="quarterInput" placeholder="Q1 2026" aria-label="Quarter name">
                    </label>
                    <label>
                        Max Initiatives per Team: <input type="number" id="maxInitiativesInput" min="1" value="2" aria-label="Maximum initiatives per team threshold">
                    </label>
                    <button id="exportBtn" aria-label="Export data as JSON file">Export JSON</button>
                    <button id="importBtn" aria-label="Import data from JSON file">Import JSON</button>
                    <input type="file" id="importFile" accept=".json" style="display: none;" aria-label="Select JSON file to import">
                    <button id="clearBtn" aria-label="Clear all data and reset to sample data">Clear All Data</button>
                </div>
            </div>
        </header>

        <!-- Initiative List -->
        <section class="initiative-section">
            <h2>Initiatives</h2>
            <div id="initiativeList"></div>
            <button id="addInitiativeBtn" class="add-btn">+ Add Initiative</button>
        </section>

        <!-- Team Summary Panel -->
        <section class="team-summary-section">
            <h2>Team Summary</h2>
            <div id="teamSummary" class="team-summary-grid"></div>
        </section>

        <!-- Quarter Committed Initiatives -->
        <section class="quarter-section">
            <h2 id="quarterSectionTitle">Q1 2026 Commitment</h2>
            <table id="quarterTable" class="initiatives-summary-table">
                <thead>
                    <tr>
                        <th>Initiative Name</th>
                        <th>Contributing Teams</th>
                        <th>ETA</th>
                    </tr>
                </thead>
                <tbody id="quarterBody"></tbody>
            </table>
        </section>

        <!-- Next (Uncommitted Initiatives) -->
        <section class="next-section">
            <h2>Next</h2>
            <table id="nextTable" class="initiatives-summary-table">
                <thead>
                    <tr>
                        <th>Initiative Name</th>
                        <th>Status</th>
                        <th>Waiting for...</th>
                    </tr>
                </thead>
                <tbody id="nextBody"></tbody>
            </table>
        </section>
    </div>

<script>
// Data Model
let appState = {
    quarter: 'Q1 2026',
    maxInitiativesPerTeam: 2,
    teams: [],
    initiatives: []
};

// Generate unique IDs
let idCounter = 0;
function generateId(prefix) {
    return `${prefix}-${Date.now()}-${idCounter++}-${Math.random().toString(36).slice(2, 11)}`;
}

// Initialize with sample data
function initializeSampleData() {
    appState = {
        quarter: 'Q1 2026',
        maxInitiativesPerTeam: 2,
        teams: [
            { id: generateId('team'), name: 'Backend Team' },
            { id: generateId('team'), name: 'Frontend Team' },
            { id: generateId('team'), name: 'Mobile Team' },
            { id: generateId('team'), name: 'DevOps Team' }
        ],
        initiatives: [
            {
                id: generateId('init'),
                name: 'Customer Dashboard Redesign',
                teamStates: {},
                eta: ''
            },
            {
                id: generateId('init'),
                name: 'Payment Integration',
                teamStates: {},
                eta: ''
            },
            {
                id: generateId('init'),
                name: 'Mobile App Performance',
                teamStates: {},
                eta: ''
            }
        ]
    };

    // Initialize all team states as uncommitted for all initiatives
    appState.initiatives.forEach(initiative => {
        appState.teams.forEach(team => {
            initiative.teamStates[team.id] = 'uncommitted';
        });
    });

    // Set some example states
    appState.initiatives[0].teamStates[appState.teams[0].id] = 'committed';
    appState.initiatives[0].teamStates[appState.teams[1].id] = 'committed';
    appState.initiatives[1].teamStates[appState.teams[0].id] = 'committed';
    appState.initiatives[2].teamStates[appState.teams[2].id] = 'completed';
}

// localStorage management
const STORAGE_KEY = 'quarterly-planning-data';

function saveToLocalStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
}

function loadFromLocalStorage() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
        try {
            const parsed = JSON.parse(stored);
            // Validate structure
            if (parsed &&
                typeof parsed.quarter === 'string' &&
                typeof parsed.maxInitiativesPerTeam === 'number' &&
                Array.isArray(parsed.teams) &&
                Array.isArray(parsed.initiatives)) {
                appState = parsed;
                return true;
            } else {
                console.warn('Invalid data structure in localStorage, using sample data');
                return false;
            }
        } catch (e) {
            console.error('Failed to parse localStorage data:', e);
            return false;
        }
    }
    return false;
}

// Header control handlers
// Update header controls values (called from render)
function updateHeaderControls() {
    const quarterInput = document.getElementById('quarterInput');
    const maxInitiativesInput = document.getElementById('maxInitiativesInput');

    quarterInput.value = appState.quarter;
    maxInitiativesInput.value = appState.maxInitiativesPerTeam;
}

// Initialize header controls event listeners (called once)
function initializeHeaderControls() {
    const quarterInput = document.getElementById('quarterInput');
    const maxInitiativesInput = document.getElementById('maxInitiativesInput');

    quarterInput.addEventListener('input', (e) => {
        appState.quarter = e.target.value;
        saveToLocalStorage();
        // Only update quarter section title, no full render
        document.getElementById('quarterSectionTitle').textContent = appState.quarter + ' Commitment';
    });

    maxInitiativesInput.addEventListener('change', (e) => {
        appState.maxInitiativesPerTeam = parseInt(e.target.value, 10);
        saveToLocalStorage();
        render();
    });
}

// Export functionality
function exportJSON() {
    const dataStr = JSON.stringify(appState, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);

    const filename = `quarterly-planning-${appState.quarter.replace(/\s+/g, '-')}.json`;

    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// Initialize export button event listener (called once)
function initializeExportButton() {
    const exportBtn = document.getElementById('exportBtn');
    exportBtn.addEventListener('click', exportJSON);
}

// Import functionality
function importJSON(file) {
    const reader = new FileReader();

    reader.onload = (e) => {
        try {
            const imported = JSON.parse(e.target.result);

            // Validate structure
            if (!imported.quarter || !imported.teams || !imported.initiatives) {
                alert('Invalid JSON file: missing required fields (quarter, teams, initiatives)');
                return;
            }

            if (!Array.isArray(imported.teams) || !Array.isArray(imported.initiatives)) {
                alert('Invalid JSON file: teams and initiatives must be arrays');
                return;
            }

            // Validate maxInitiativesPerTeam
            if (typeof imported.maxInitiativesPerTeam !== 'number' || imported.maxInitiativesPerTeam < 1) {
                imported.maxInitiativesPerTeam = 2; // Default
            }

            // Ensure all initiatives have eta field
            imported.initiatives.forEach(initiative => {
                if (!initiative.eta) {
                    initiative.eta = '';
                }
            });

            // Synchronize team states with teams list
            const validTeamIds = new Set(imported.teams.map(t => t.id));

            imported.initiatives.forEach(initiative => {
                // Ensure initiative has teamStates object
                if (!initiative.teamStates) {
                    initiative.teamStates = {};
                }

                // Remove orphaned team states (teams that no longer exist)
                Object.keys(initiative.teamStates).forEach(teamId => {
                    if (!validTeamIds.has(teamId)) {
                        delete initiative.teamStates[teamId];
                    }
                });

                // Add missing team states for new teams (set to uncommitted)
                imported.teams.forEach(team => {
                    if (!initiative.teamStates[team.id]) {
                        initiative.teamStates[team.id] = 'uncommitted';
                    }
                });
            });

            // Confirm before replacing
            if (!confirm('This will replace all current data. Continue?')) {
                return;
            }

            appState = imported;
            saveToLocalStorage();
            render();
            alert('Data imported successfully!');
        } catch (error) {
            alert('Failed to import JSON: ' + error.message);
        }
    };

    reader.readAsText(file);
}

// Setup import button
// Initialize import button event listener (called once)
function initializeImportButton() {
    const importBtn = document.getElementById('importBtn');
    const importFile = document.getElementById('importFile');

    importBtn.addEventListener('click', () => {
        importFile.click();
    });

    importFile.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            importJSON(file);
        }
        // Reset file input
        e.target.value = '';
    });
}

// Clear all data
function clearAllData() {
    if (!confirm('Are you sure you want to clear all data? This cannot be undone.')) {
        return;
    }

    initializeSampleData();
    saveToLocalStorage();
    render();
    alert('All data cleared and reset to sample data.');
}

// Setup clear button
// Initialize clear button event listener (called once)
function initializeClearButton() {
    const clearBtn = document.getElementById('clearBtn');
    clearBtn.addEventListener('click', clearAllData);
}

// Calculate team colors once and cache them (performance optimization)
function calculateTeamColors() {
    const cache = {};
    const threshold = appState.maxInitiativesPerTeam;

    appState.teams.forEach(team => {
        const committedCount = appState.initiatives.filter(initiative =>
            initiative.teamStates[team.id] === 'committed'
        ).length;

        if (committedCount >= threshold) {
            cache[team.id] = '#e74c3c'; // Red: at/over capacity
        } else if (committedCount > 0) {
            cache[team.id] = '#f39c12'; // Yellow: some commitments, has room
        } else {
            cache[team.id] = '#27ae60'; // Green: no commitments, fully available
        }
    });

    return cache;
}

// Get team color from cache (fallback to direct calculation if needed)
function getTeamColor(teamId, colorCache = null) {
    if (colorCache && colorCache[teamId]) {
        return colorCache[teamId];
    }

    // Fallback: direct calculation (for backward compatibility)
    const committedCount = appState.initiatives.filter(initiative =>
        initiative.teamStates[teamId] === 'committed'
    ).length;

    const threshold = appState.maxInitiativesPerTeam;

    if (committedCount >= threshold) {
        return '#e74c3c'; // Red: at/over capacity
    } else if (committedCount > 0) {
        return '#f39c12'; // Yellow: some commitments, has room
    } else {
        return '#27ae60'; // Green: no commitments, fully available
    }
}

// Initialize all event listeners (called once on app load)
function initializeEventListeners() {
    initializeHeaderControls();
    initializeExportButton();
    initializeImportButton();
    initializeClearButton();
    initializeAddInitiativeButton();
}

// Initialize app
function initializeApp() {
    const hasStoredData = loadFromLocalStorage();
    if (!hasStoredData) {
        initializeSampleData();
        saveToLocalStorage();
    }
    initializeEventListeners();
    render();
}

function render() {
    console.log('Rendering with state:', appState);
    // Calculate team colors once for entire render cycle (performance optimization)
    const teamColorCache = calculateTeamColors();
    updateHeaderControls();
    renderInitiatives(teamColorCache);
    renderInitiativesSummary(teamColorCache);
    renderTeamSummary(teamColorCache);
}

function renderInitiatives(teamColorCache) {
    const initiativeList = document.getElementById('initiativeList');
    initiativeList.innerHTML = '';

    appState.initiatives.forEach(initiative => {
        const row = createInitiativeRow(initiative, teamColorCache);
        initiativeList.appendChild(row);
    });
}

function getInitiativeStatusColor(initiative) {
    // Filter out N/A teams, only consider active team states
    const activeStates = Object.values(initiative.teamStates)
        .filter(state => state !== 'not-applicable');
    const hasUncommitted = activeStates.some(state => state === 'uncommitted');
    const hasCommitted = activeStates.some(state => state === 'committed');
    const hasCompleted = activeStates.some(state => state === 'completed');

    if (!hasUncommitted) {
        return '#27ae60'; // Green: All active teams committed
    } else if (hasCommitted || hasCompleted) {
        return '#f39c12'; // Yellow: Partially committed
    } else {
        return '#e74c3c'; // Red: Not started
    }
}

function createInitiativeRow(initiative, teamColorCache) {
    const row = document.createElement('div');
    row.className = 'initiative-row';
    row.dataset.initiativeId = initiative.id;

    // Set colored left border based on status
    const statusColor = getInitiativeStatusColor(initiative);
    row.style.borderLeft = `5px solid ${statusColor}`;

    // Add drag-over event listeners to row for drop zone
    row.addEventListener('dragover', handleRowDragOver);
    row.addEventListener('dragleave', handleRowDragLeave);
    row.addEventListener('drop', (e) => handleRowDrop(e, row));

    // === HEADER SECTION ===
    const header = document.createElement('div');
    header.className = 'initiative-header';

    // Grip handle for drag-and-drop reordering
    const grip = document.createElement('div');
    grip.className = 'initiative-grip-col';
    grip.innerHTML = '⋮⋮';
    grip.draggable = true;
    grip.setAttribute('aria-label', 'Drag to reorder initiative');
    grip.addEventListener('dragstart', (e) => handleRowDragStart(e, row));
    grip.addEventListener('dragend', (e) => handleRowDragEnd(e, row));

    // Name input (title style)
    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.className = 'initiative-name-input';
    nameInput.value = initiative.name;
    nameInput.placeholder = 'Initiative name';
    nameInput.addEventListener('input', (e) => {
        initiative.name = e.target.value;
        saveToLocalStorage();
    });
    nameInput.addEventListener('blur', () => {
        render();
    });

    // Header controls (delete button)
    const controls = document.createElement('div');
    controls.className = 'initiative-header-controls';

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'initiative-delete-btn';
    deleteBtn.innerHTML = '×';
    deleteBtn.title = 'Delete initiative';
    deleteBtn.setAttribute('aria-label', `Delete initiative: ${initiative.name}`);
    deleteBtn.addEventListener('click', () => deleteInitiative(initiative.id));

    controls.appendChild(deleteBtn);

    header.appendChild(grip);
    header.appendChild(nameInput);
    header.appendChild(controls);

    // === BODY SECTION ===
    const body = document.createElement('div');
    body.className = 'initiative-body';

    // State columns
    const uncommittedCol = createStateColumn('uncommitted', initiative, teamColorCache);
    const committedCol = createStateColumn('committed', initiative, teamColorCache);
    const completedCol = createStateColumn('completed', initiative, teamColorCache);
    const naCol = createStateColumn('not-applicable', initiative, teamColorCache);

    body.appendChild(uncommittedCol);
    body.appendChild(committedCol);
    body.appendChild(completedCol);
    body.appendChild(naCol);

    // Assemble row
    row.appendChild(header);
    row.appendChild(body);

    return row;
}

function createStateColumn(state, initiative, teamColorCache) {
    const col = document.createElement('div');
    col.className = 'state-column';
    col.dataset.state = state;
    col.dataset.initiativeId = initiative.id;

    const header = document.createElement('div');
    header.className = 'state-column-header';
    // Display "N/A" for not-applicable state
    header.textContent = state === 'not-applicable' ? 'N/A' : state.charAt(0).toUpperCase() + state.slice(1);
    col.appendChild(header);

    // Add team tags for this state
    appState.teams.forEach(team => {
        // Defensive check: ensure teamStates exists and has this team
        if (initiative.teamStates && initiative.teamStates[team.id] === state) {
            const tag = createTeamTag(team, initiative.id, teamColorCache);
            col.appendChild(tag);
        }
    });

    // Setup drop zone
    setupDropZone(col);

    return col;
}

function createTeamTag(team, initiativeId, teamColorCache = null) {
    const tag = document.createElement('div');
    tag.className = 'team-tag';
    tag.textContent = team.name;
    tag.draggable = true;
    tag.tabIndex = 0; // Make focusable for keyboard navigation
    tag.dataset.teamId = team.id;
    tag.dataset.initiativeId = initiativeId;
    tag.style.backgroundColor = getTeamColor(team.id, teamColorCache);

    // Get current state for ARIA label
    const initiative = appState.initiatives.find(i => i.id === initiativeId);
    const currentState = initiative ? initiative.teamStates[team.id] : 'uncommitted';
    tag.setAttribute('role', 'button');
    tag.setAttribute('aria-label', `${team.name} - ${currentState}. Press Enter or Space to cycle state.`);

    tag.addEventListener('dragstart', handleDragStart);
    tag.addEventListener('dragend', handleDragEnd);

    // Keyboard navigation
    tag.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            cycleTeamState(team.id, initiativeId);
        }
    });

    return tag;
}

// Cycle team state: uncommitted → committed → completed → uncommitted
function cycleTeamState(teamId, initiativeId) {
    const initiative = appState.initiatives.find(i => i.id === initiativeId);
    if (!initiative) return;

    const currentState = initiative.teamStates[teamId];
    const states = ['uncommitted', 'committed', 'completed'];
    const currentIndex = states.indexOf(currentState);
    const nextIndex = (currentIndex + 1) % states.length;

    initiative.teamStates[teamId] = states[nextIndex];
    saveToLocalStorage();
    render();
}

function updateCommitmentBadge(badge, initiative) {
    const allCommitted = Object.values(initiative.teamStates).every(
        state => state === 'committed' || state === 'completed'
    );

    if (allCommitted) {
        badge.textContent = '✓ All Committed';
        badge.className = 'initiative-commitment-badge badge-committed';
    } else {
        badge.textContent = '⚠ Pending Commitment';
        badge.className = 'initiative-commitment-badge badge-pending';
    }
}

let draggedElement = null;
let draggedRow = null;

function handleDragStart(e) {
    draggedElement = e.target;
    e.target.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/html', e.target.innerHTML);
}

function handleDragEnd(e) {
    e.target.classList.remove('dragging');

    // Remove drag-over class from all columns
    document.querySelectorAll('.state-column').forEach(col => {
        col.classList.remove('drag-over');
    });
}

function setupDropZone(col) {
    col.addEventListener('dragover', handleDragOver);
    col.addEventListener('dragenter', handleDragEnter);
    col.addEventListener('dragleave', handleDragLeave);
    col.addEventListener('drop', handleDrop);
}

function handleDragOver(e) {
    if (e.preventDefault) {
        e.preventDefault();
    }
    e.dataTransfer.dropEffect = 'move';
    return false;
}

function handleDragEnter(e) {
    if (e.target.classList.contains('state-column')) {
        e.target.classList.add('drag-over');
    }
}

function handleDragLeave(e) {
    if (e.target.classList.contains('state-column')) {
        e.target.classList.remove('drag-over');
    }
}

function handleDrop(e) {
    if (e.stopPropagation) {
        e.stopPropagation();
    }
    e.preventDefault();

    const dropTarget = e.target.closest('.state-column');
    if (!dropTarget || !draggedElement) {
        return false;
    }

    const teamId = draggedElement.dataset.teamId;
    const initiativeId = draggedElement.dataset.initiativeId;
    const newState = dropTarget.dataset.state;

    // Update state in data model
    const initiative = appState.initiatives.find(i => i.id === initiativeId);
    if (initiative) {
        initiative.teamStates[teamId] = newState;
        saveToLocalStorage();
        render();
    }

    return false;
}

// Row reordering drag handlers
function handleRowDragStart(e, row) {
    draggedRow = row;
    row.classList.add('dragging-row');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/html', row.innerHTML);
}

function handleRowDragEnd(e, row) {
    row.classList.remove('dragging-row');

    // Remove drag-over class from all rows
    document.querySelectorAll('.initiative-row').forEach(r => {
        r.classList.remove('drag-over');
    });

    draggedRow = null;
}

function handleRowDragOver(e) {
    if (e.preventDefault) {
        e.preventDefault();
    }

    // Only handle row dragging, not team tag dragging
    if (!draggedRow) {
        return;
    }

    e.dataTransfer.dropEffect = 'move';

    const row = e.currentTarget;
    if (row !== draggedRow) {
        row.classList.add('drag-over');
    }

    return false;
}

function handleRowDragLeave(e) {
    const row = e.currentTarget;
    row.classList.remove('drag-over');
}

function handleRowDrop(e, targetRow) {
    if (e.stopPropagation) {
        e.stopPropagation();
    }
    e.preventDefault();

    // Only handle row dragging, not team tag dragging
    if (!draggedRow || !targetRow || draggedRow === targetRow) {
        return false;
    }

    // Get initiative IDs
    const draggedId = draggedRow.dataset.initiativeId;
    const targetId = targetRow.dataset.initiativeId;

    // Find indices in array
    const draggedIndex = appState.initiatives.findIndex(i => i.id === draggedId);
    const targetIndex = appState.initiatives.findIndex(i => i.id === targetId);

    if (draggedIndex === -1 || targetIndex === -1) {
        return false;
    }

    // Reorder array
    const [removed] = appState.initiatives.splice(draggedIndex, 1);
    appState.initiatives.splice(targetIndex, 0, removed);

    saveToLocalStorage();
    render();

    return false;
}

function deleteInitiative(initiativeId) {
    if (!confirm('Are you sure you want to delete this initiative?')) {
        return;
    }

    appState.initiatives = appState.initiatives.filter(i => i.id !== initiativeId);
    saveToLocalStorage();
    render();
}

function addInitiative() {
    const newInitiative = {
        id: generateId('init'),
        name: 'New Initiative',
        teamStates: {},
        eta: ''
    };

    // Initialize all teams as uncommitted
    appState.teams.forEach(team => {
        newInitiative.teamStates[team.id] = 'uncommitted';
    });

    appState.initiatives.push(newInitiative);
    saveToLocalStorage();
    render();
}

// Initialize add initiative button event listener (called once)
function initializeAddInitiativeButton() {
    const addBtn = document.getElementById('addInitiativeBtn');
    addBtn.addEventListener('click', addInitiative);
}

function renderInitiativesSummary(teamColorCache) {
    // Update quarter section title
    const quarterTitle = document.getElementById('quarterSectionTitle');
    quarterTitle.textContent = appState.quarter + ' Commitment';

    // Get table bodies
    const quarterBody = document.getElementById('quarterBody');
    const nextBody = document.getElementById('nextBody');
    quarterBody.innerHTML = '';
    nextBody.innerHTML = '';

    // Split initiatives into committed and uncommitted
    const committedInitiatives = [];
    const uncommittedInitiatives = [];

    appState.initiatives.forEach(initiative => {
        // Filter out N/A teams (not-applicable), only consider active team states
        const activeStates = Object.values(initiative.teamStates)
            .filter(state => state !== 'not-applicable');
        const hasUncommitted = activeStates.some(state => state === 'uncommitted');

        if (!hasUncommitted) {
            // All active teams committed or completed - goes to quarter section
            committedInitiatives.push(initiative);
        } else {
            // At least one active team uncommitted - goes to next section
            uncommittedInitiatives.push(initiative);
        }
    });

    // Render committed initiatives (quarter section)
    committedInitiatives.forEach(initiative => {
        const row = document.createElement('tr');

        // Initiative name cell
        const nameCell = document.createElement('td');
        nameCell.textContent = initiative.name;
        row.appendChild(nameCell);

        // Contributing teams cell
        const teamsCell = document.createElement('td');
        const contributingTeams = appState.teams
            .filter(team => {
                const state = initiative.teamStates[team.id];
                return state === 'committed' || state === 'completed';
            });

        contributingTeams.forEach(team => {
            const tag = document.createElement('span');
            tag.className = 'team-tag-summary';
            tag.textContent = team.name;
            tag.style.backgroundColor = getTeamColor(team.id, teamColorCache);
            teamsCell.appendChild(tag);
        });
        row.appendChild(teamsCell);

        // ETA cell with editable input
        const etaCell = document.createElement('td');
        const etaInput = document.createElement('input');
        etaInput.type = 'text';
        etaInput.className = 'eta-input';
        etaInput.value = initiative.eta || '';
        etaInput.placeholder = 'Enter ETA';
        etaInput.setAttribute('aria-label', `ETA for ${initiative.name}`);
        etaInput.addEventListener('input', (e) => {
            initiative.eta = e.target.value;
            saveToLocalStorage();
        });
        etaCell.appendChild(etaInput);
        row.appendChild(etaCell);

        quarterBody.appendChild(row);
    });

    // Render uncommitted initiatives (next section)
    uncommittedInitiatives.forEach(initiative => {
        const row = document.createElement('tr');

        // Initiative name cell
        const nameCell = document.createElement('td');
        nameCell.textContent = initiative.name;
        row.appendChild(nameCell);

        // Status cell with traffic light system (ignore N/A teams)
        const statusCell = document.createElement('td');
        const activeStates = Object.values(initiative.teamStates)
            .filter(state => state !== 'not-applicable');
        const hasCommitted = activeStates.some(state => state === 'committed');
        const hasCompleted = activeStates.some(state => state === 'completed');

        if (hasCommitted || hasCompleted) {
            // Green: Some teams committed/completed, work can proceed
            statusCell.innerHTML = '<span class="initiative-commitment-badge badge-committed">✓ Can Proceed</span>';
        } else {
            // Red: All teams uncommitted, initiative is blocked
            statusCell.innerHTML = '<span class="initiative-commitment-badge badge-blocked">⏸ Blocked</span>';
        }
        row.appendChild(statusCell);

        // Uncommitted teams cell
        const teamsCell = document.createElement('td');
        const uncommittedTeams = appState.teams
            .filter(team => initiative.teamStates[team.id] === 'uncommitted');

        uncommittedTeams.forEach(team => {
            const tag = document.createElement('span');
            tag.className = 'team-tag-summary';
            tag.textContent = team.name;
            tag.style.backgroundColor = getTeamColor(team.id, teamColorCache);
            teamsCell.appendChild(tag);
        });

        row.appendChild(teamsCell);
        nextBody.appendChild(row);
    });
}

function renderTeamSummary(teamColorCache) {
    const teamSummary = document.getElementById('teamSummary');
    teamSummary.innerHTML = '';

    appState.teams.forEach(team => {
        const column = createTeamColumn(team, teamColorCache);
        teamSummary.appendChild(column);
    });
}

function createTeamColumn(team, teamColorCache) {
    const column = document.createElement('div');
    column.className = 'team-column';
    column.style.borderLeft = `5px solid ${getTeamColor(team.id, teamColorCache)}`;

    // Calculate committed count
    const committedCount = appState.initiatives.filter(
        initiative => initiative.teamStates[team.id] === 'committed'
    ).length;

    // Create header with capacity indicator
    const header = document.createElement('div');
    header.className = 'team-column-header';

    // Team name (always dark, prominent)
    const nameSpan = document.createElement('span');
    nameSpan.className = 'team-name';
    nameSpan.textContent = team.name;

    // Capacity count (colored based on capacity)
    const capacitySpan = document.createElement('span');
    capacitySpan.className = 'team-capacity';
    capacitySpan.textContent = `${committedCount}/${appState.maxInitiativesPerTeam}`;
    capacitySpan.style.color = getTeamColor(team.id, teamColorCache);

    header.appendChild(nameSpan);
    header.appendChild(capacitySpan);
    column.appendChild(header);

    // Add initiative tags for committed and uncommitted states
    appState.initiatives.forEach(initiative => {
        const state = initiative.teamStates[team.id];
        if (state === 'committed' || state === 'uncommitted') {
            const tag = createInitiativeTag(initiative, state);
            column.appendChild(tag);
        }
    });

    return column;
}

function createInitiativeTag(initiative, state) {
    const tag = document.createElement('div');
    tag.className = `initiative-tag ${state}`;
    tag.textContent = initiative.name;
    return tag;
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', initializeApp);
</script>
